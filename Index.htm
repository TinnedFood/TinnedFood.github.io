<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TinnedFood 资源分享站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .resource-category {
            margin-bottom: 30px;
        }
        .category-title {
            font-size: 22px;
            color: #2c3e50;
            border-left: 4px solid #3498db;
            padding-left: 10px;
            margin-bottom: 15px;
        }
        .resource-list {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        .resource-item:last-child {
            border-bottom: none;
        }
        .resource-name {
            font-weight: 500;
        }
        .resource-desc {
            color: #666;
            font-size: 14px;
        }
        .download-btn {
            background-color: #3498db;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }
        .download-btn:hover {
            background-color: #2980b9;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>TinnedFood 资源分享站</h1>
        <p>分享编程、游戏、工具等资源</p>
    </header>

    <div class="container">
        <div class="resource-category">
            <h2 class="category-title">游戏MOD</h2>
            <div class="resource-list">
                <div class="resource-item">
                    <div>
                        <div class="resource-name">星露谷AI自由对话MOD</div>
                        <div class="resource-desc">让星露谷NPC接入AI，自由对话、记忆互动</div>
                    </div>
                    <a href="#" class="download-btn">下载</a>
                </div>
                <div class="resource-item">
                    <div>
                        <div class="resource-name">自定义UI库 SeeUI</div>
                        <div class="resource-desc">轻量、跨平台的UI组件库</div>
                    </div>
                    <a href="#" class="download-btn">下载</a>
                </div>
            </div>
        </div>

        <div class="resource-category">
            <h2 class="category-title">编程语言</h2>
            <div class="resource-list">
                <div class="resource-item">
                    <div>
                        <div class="resource-name">Keal 语言标准库</div>
                        <div class="resource-desc">Keal 语言的核心标准库与示例代码</div>
                    </div>
                    <a href="#" class="download-btn">下载</a>
                </div>
                <div class="resource-item">
                    <div>
                        <div class="resource-name">NC 语言内核开发工具</div>
                        <div class="resource-desc">面向内核与驱动开发的底层语言工具链</div>
                    </div>
                    <a href="#" class="download-btn">下载</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 TinnedFood | 资源分享站</p>
    </footer>
</body>
</html>
